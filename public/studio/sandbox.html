<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; style-src 'unsafe-inline'; img-src blob: data:; frame-ancestors 'self'" />
  <title>Studio Sandbox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/p5@2.2.1/lib/p5.min.js"></script>
<!-- svgcanvas loaded dynamically on demand via import() in captureSvg() -->
<script>
(function () {
  'use strict';

  var currentP5 = null;
  var heartbeatInterval = null;
  var consoleBuffer = [];
  var entryId = 0;
  var parentOrigin = null;

  // Send message to parent with origin restriction
  function postToParent(data) {
    parent.postMessage(data, parentOrigin || '*');
  }

  // Intercept console methods
  var origConsole = {
    log: console.log.bind(console),
    warn: console.warn.bind(console),
    error: console.error.bind(console),
    info: console.info.bind(console),
  };

  function interceptConsole(method) {
    console[method] = function () {
      var args = Array.prototype.slice.call(arguments);
      origConsole[method].apply(console, arguments);
      consoleBuffer.push({
        id: String(entryId++),
        type: method,
        args: args.map(function (a) {
          try { return String(a); } catch (e) { return '[object]'; }
        }),
        timestamp: Date.now(),
      });
      if (consoleBuffer.length >= 50) {
        flushConsole();
      }
    };
  }

  interceptConsole('log');
  interceptConsole('warn');
  interceptConsole('error');
  interceptConsole('info');

  function flushConsole() {
    if (consoleBuffer.length === 0) return;
    postToParent({ type: 'sandbox:console', entries: consoleBuffer });
    consoleBuffer = [];
  }

  // Start heartbeat
  function startHeartbeat() {
    if (heartbeatInterval) clearInterval(heartbeatInterval);
    heartbeatInterval = setInterval(function () {
      flushConsole();
      postToParent({ type: 'sandbox:heartbeat' });
    }, 2000);
  }

  function stopSketch() {
    if (currentP5) {
      currentP5.remove();
      currentP5 = null;
    }
    // Clear any remaining canvases
    var canvases = document.querySelectorAll('canvas');
    for (var i = 0; i < canvases.length; i++) {
      canvases[i].remove();
    }
  }

  function runSketch(code, config) {
    stopSketch();

    try {
      // Set up global config if provided
      if (config) {
        window.__studioConfig = config;
      }

      // Remove previous user script
      var prev = document.getElementById('__sketch_code');
      if (prev) prev.remove();

      // Inject as <script> so function declarations (setup/draw) attach to window
      var script = document.createElement('script');
      script.id = '__sketch_code';
      script.textContent = code;
      document.body.appendChild(script);

      // Create p5 instance in global mode
      currentP5 = new p5();
    } catch (err) {
      postToParent({
        type: 'sandbox:error',
        error: err.message || String(err),
      });
    }
  }

  async function captureSvg() {
    if (!currentP5) {
      postToParent({
        type: 'sandbox:error',
        error: 'SVG capture requires a running p5.js sketch',
      });
      return;
    }
    try {
      var canvas = document.querySelector('canvas');
      if (!canvas) {
        postToParent({
          type: 'sandbox:error',
          error: 'No canvas found for SVG capture',
        });
        return;
      }
      var w = canvas.width;
      var h = canvas.height;

      // Dynamically import svgcanvas ESM build
      var svgcanvas = await import('https://cdn.jsdelivr.net/npm/svgcanvas@2.6.0/dist/svgcanvas.esm.js');
      var svgCtx = new svgcanvas.Context(w, h);

      // Swap the p5 renderer's drawing context to SVG
      var renderer = currentP5._renderer;
      if (!renderer || !renderer.drawingContext) {
        postToParent({
          type: 'sandbox:error',
          error: 'SVG capture is not supported with this p5.js version',
        });
        return;
      }
      var originalCtx = renderer.drawingContext;
      renderer.drawingContext = svgCtx;

      // Call draw() once to render to SVG context
      if (typeof window.draw === 'function') {
        window.draw();
      }

      // Restore original context
      renderer.drawingContext = originalCtx;

      // Serialize SVG (true = fix named entities for standalone SVG)
      var svgString = svgCtx.getSerializedSvg(true);
      postToParent({
        type: 'sandbox:capture-svg',
        svg: svgString,
      });
    } catch (err) {
      postToParent({
        type: 'sandbox:error',
        error: 'SVG capture failed: ' + (err.message || String(err)),
      });
    }
  }

  function captureCanvas() {
    var canvas = document.querySelector('canvas');
    if (!canvas) {
      postToParent({
        type: 'sandbox:error',
        error: 'No canvas found for capture',
      });
      return;
    }
    try {
      var dataUrl = canvas.toDataURL('image/png');
      postToParent({
        type: 'sandbox:capture',
        dataUrl: dataUrl,
      });
    } catch (err) {
      postToParent({
        type: 'sandbox:error',
        error: 'Canvas capture failed: ' + (err.message || String(err)),
      });
    }
  }

  // Global error handler
  window.onerror = function (msg, src, line, col, err) {
    postToParent({
      type: 'sandbox:error',
      error: msg + (line ? ' (line ' + line + ')' : ''),
    });
  };

  window.onunhandledrejection = function (event) {
    postToParent({
      type: 'sandbox:error',
      error: 'Unhandled promise rejection: ' + (event.reason?.message || String(event.reason)),
    });
  };

  // Listen for messages from parent
  window.addEventListener('message', function (event) {
    // Only accept messages from the parent frame
    if (event.source !== window.parent) return;
    // Lock to the first origin we receive (the real parent)
    if (!parentOrigin) {
      parentOrigin = event.origin;
      // Heartbeat is already running; just send ready now that origin is locked
      postToParent({ type: 'sandbox:ready' });
    } else if (event.origin !== parentOrigin) return;

    var msg = event.data;
    if (!msg || !msg.type) return;

    switch (msg.type) {
      case 'sketch:run':
        runSketch(msg.code || '', msg.config);
        break;
      case 'sketch:stop':
        stopSketch();
        break;
      case 'sketch:capture':
        captureCanvas();
        break;
      case 'sketch:capture-svg':
        captureSvg();
        break;
      case 'sketch:configure':
        if (msg.config) {
          window.__studioConfig = msg.config;
        }
        break;
    }
  });

  // Start heartbeat immediately so the parent watchdog is fed even if the
  // first sketch:run message arrives before this script finishes loading
  // (e.g. while p5.js CDN is still downloading). frame-ancestors 'self' in
  // the CSP prevents malicious embeds, so postMessage('*') is safe here.
  startHeartbeat();
})();
</script>
</body>
</html>
